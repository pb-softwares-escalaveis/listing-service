<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <title>LeilãoNet - Compra e Venda Online</title>
    <style>
        /* Early 2000s Global Styles */
        body {
            font-family: Verdana, Arial, Helvetica, sans-serif;
            font-size: 11px;
            background-color: #ffffff;
            color: #000000;
            margin: 10px;
        }

        /* Container & Typography */
        .container {
            width: 100%;
            max-width: 950px;
            margin: 0 auto;
            border: 1px solid #000000;
            padding: 10px;
        }

        h1 {
            font-family: "Times New Roman", Times, serif;
            font-size: 26px;
            color: #000066;
            margin-top: 0;
            margin-bottom: 5px;
            letter-spacing: 1px;
        }

        h2 {
            font-size: 14px;
            color: #000000;
            border-bottom: 2px solid #336699;
            padding-bottom: 2px;
            margin-bottom: 10px;
        }

        a {
            color: #0000cc;
            text-decoration: none;
        }

        a:hover {
            color: #cc0000;
            text-decoration: underline;
        }

        /* Nav & Headers */
        .nav-bar {
            background-color: #336699;
            color: #ffffff;
            padding: 5px 10px;
            font-weight: bold;
            font-size: 12px;
            border: 1px solid #000000;
            margin-bottom: 15px;
        }

        .nav-bar a {
            color: #ffffff;
            margin-right: 15px;
            cursor: pointer;
        }

        .nav-bar a:hover {
            color: #ffffcc;
        }

        /* Search Panel */
        .search-panel {
            background-color: #e6f0ff;
            border: 1px solid #000000;
            padding: 10px;
            margin-bottom: 20px;
        }

        .search-row {
            margin-bottom: 8px;
        }

        /* Form Elements */
        input[type="text"], input[type="number"], select {
            font-family: Verdana, Arial, sans-serif;
            font-size: 11px;
            padding: 2px 4px;
            border: 1px inset #cccccc;
        }

        input[type="checkbox"] {
            vertical-align: middle;
        }

        button {
            font-family: Verdana, Arial, sans-serif;
            font-size: 11px;
            font-weight: bold;
            background-color: #d4d0c8;
            border: 1px outset #ffffff;
            border-right-color: #808080;
            border-bottom-color: #808080;
            padding: 3px 8px;
            cursor: pointer;
            color: #000000;
        }

        button:active {
            border-style: inset;
        }

        /* Autocomplete Box */
        .search-wrapper {
            position: relative;
            display: inline-block;
            width: 300px;
        }

        #searchInput {
            width: 100%;
        }

        #autocompleteResults {
            position: absolute;
            top: 100%;
            left: 0;
            right: 0;
            background: #ffffff;
            border: 1px solid #000000;
            z-index: 1000;
            display: none;
        }

        .autocomplete-item {
            padding: 4px 6px;
            cursor: pointer;
            border-bottom: 1px solid #eeeeee;
        }

        .autocomplete-item:hover {
            background-color: #000066;
            color: #ffffff;
        }

        /* Results Grid */
        #resultsGrid {
            text-align: left;
        }

        .card {
            display: inline-block;
            vertical-align: top;
            width: 210px;
            border: 1px solid #999999;
            background-color: #ffffff;
            margin: 0 10px 10px 0;
            padding: 5px;
            text-align: center;
        }

        .card:hover {
            border-color: #0000cc;
            background-color: #f9f9f9;
        }

        .card img {
            width: 100%;
            height: 140px;
            object-fit: cover;
            border: 1px solid #000000;
            margin-bottom: 5px;
        }

        .card-title {
            font-size: 12px;
            font-weight: bold;
            color: #0000cc;
            margin-bottom: 4px;
            display: block;
            height: 30px;
            overflow: hidden;
            text-decoration: underline;
            cursor: pointer;
        }

        .card-title:hover {
            color: #cc0000;
        }

        .card-desc {
            font-size: 10px;
            color: #333333;
            height: 40px;
            overflow: hidden;
            margin-bottom: 5px;
        }

        .badges {
            font-size: 9px;
            color: #006600;
            font-weight: bold;
            margin-bottom: 5px;
        }

        .price {
            font-size: 14px;
            font-weight: bold;
            color: #cc0000;
            margin: 5px 0;
        }

        .timer-box {
            background-color: #ffffcc;
            border: 1px solid #cccc99;
            padding: 3px;
            font-size: 10px;
            font-weight: bold;
            color: #000000;
        }

        .countdown-timer {
            color: #cc0000;
        }
    </style>
</head>

<body>

<div class="container">
    <h1>oLeiloeiroOnline</h1>

    <div class="nav-bar">
        <a onclick="loadLatest()">» Página Inicial (Últimos Adicionados)</a>
    </div>

    <div class="search-panel">
        <div class="search-row">
            <strong>Palavra-chave:</strong>
            <div class="search-wrapper">
                <input type="text" id="searchInput" placeholder="Ex: Caminhão..." autocomplete="off">
                <div id="autocompleteResults"></div>
            </div>
            <button onclick="performComplexSearch()">Buscar Item</button>
        </div>

        <div class="search-row" style="margin-top: 10px;">
            <strong>Categoria:</strong>
            <select id="categoryFilter">
                <option value="">Todas as Categorias</option>
                <option value="ELECTRONICS">Eletrônicos</option>
                <option value="VEHICLES">Veículos</option>
                <option value="FASHION">Moda e Vestuário</option>
                <option value="COLLECTIBLES_AND_ART">Colecionáveis & Arte</option>
                <option value="SPORTS">Esportes</option>
                <option value="HEALTH_AND_BEAUTY">Saúde & Beleza</option>
                <option value="BOOKS">Livros</option>
                <option value="MOVIE">Filmes</option>
                <option value="MUSIC">Música</option>
                <option value="INDUSTRIAL">Industrial e Comercial</option>
                <option value="JEWELRY">Joias e Relógios</option>
                <option value="PETS">Artigos para Pets</option>
                <option value="TOYS">Brinquedos</option>
                <option value="HOME_AND_GARDEN">Casa & Jardim</option>
                <option value="OTHER">Outros</option>
            </select>

            <strong style="margin-left: 10px;">Preço (R$):</strong>
            <input type="number" id="minPrice" placeholder="Mín" style="width: 60px;" min="0"> a
            <input type="number" id="maxPrice" placeholder="Máx" style="width: 60px;" min="0">
        </div>

        <div class="search-row" style="margin-top: 10px;">
            <strong>Ordem:</strong>
            <select id="sortFilter">
                <option value="_score|DESC">Relevância</option>
                <option value="price|ASC">Menor Preço</option>
                <option value="price|DESC">Maior Preço</option>
                <option value="date|ASC">Menos Tempo Restante</option>
                <option value="date|DESC">Mais Tempo Restante</option>
                <option value="created|DESC">Recém Adicionados</option>
                <option value="title|ASC">Ordem Alfabética (A-Z)</option>
                <option value="title|DESC">Ordem Alfabética (Z-A)</option>
            </select>

            <label style="margin-left: 15px; color: #cc0000; font-weight: bold;">
                <input type="checkbox" id="endingSoonFilter">
                Termina nas próximas 24h!
            </label>
        </div>
    </div>

    <h2>Resultados da Pesquisa</h2>
    <div id="resultsGrid">
        <p>Aguarde, carregando o sistema...</p>
    </div>
</div>

<script>
    const API_BASE_URL = 'http://localhost:8065/listings/auctions';

    // --- 1. AUTOCOMPLETE LOGIC ---
    let debounceTimer;
    const searchInput = document.getElementById('searchInput');
    const autocompleteBox = document.getElementById('autocompleteResults');

    searchInput.addEventListener('input', (e) => {
        const query = e.target.value.trim();
        clearTimeout(debounceTimer);

        if (query.length < 2) {
            autocompleteBox.style.display = 'none';
            return;
        }

        debounceTimer = setTimeout(() => {
            fetch(`${API_BASE_URL}/search/autocomplete?q=${encodeURIComponent(query)}`)
                .then(res => res.json())
                .then(data => {
                    autocompleteBox.innerHTML = '';
                    if (data.length > 0) {
                        data.forEach(item => {
                            const div = document.createElement('div');
                            div.className = 'autocomplete-item';
                            div.textContent = item.title;
                            div.onclick = () => {
                                searchInput.value = item.title;
                                autocompleteBox.style.display = 'none';
                                performComplexSearch();
                            };
                            autocompleteBox.appendChild(div);
                        });
                        autocompleteBox.style.display = 'block';
                    } else {
                        autocompleteBox.style.display = 'none';
                    }
                }).catch(err => console.error("Erro no autocomplete:", err));
        }, 300);
    });

    document.addEventListener('click', (e) => {
        if (e.target !== searchInput) autocompleteBox.style.display = 'none';
    });

    // --- 2. FULL COMPLEX SEARCH LOGIC ---
    function performComplexSearch() {
        const query = searchInput.value.trim();
        const category = document.getElementById('categoryFilter').value;
        const minPrice = document.getElementById('minPrice').value;
        const maxPrice = document.getElementById('maxPrice').value;
        const endingSoon = document.getElementById('endingSoonFilter').checked;
        const sortValue = document.getElementById('sortFilter').value;
        const [sortBy, sortDir] = sortValue.split('|');

        const url = new URL(`${API_BASE_URL}/search`);
        if (query) url.searchParams.append('q', query);
        if (category) url.searchParams.append('category', category);
        if (minPrice && parseFloat(minPrice) > 0) url.searchParams.append('minPrice', minPrice);
        if (maxPrice && parseFloat(maxPrice) > 0) url.searchParams.append('maxPrice', maxPrice);
        if (endingSoon) url.searchParams.append('endingSoon', 'true');

        url.searchParams.append('sortBy', sortBy);
        url.searchParams.append('sortDir', sortDir);

        fetchDataAndRender(url);
    }

    // --- 3. HOMEPAGE LATEST LOGIC ---
    function loadLatest() {
        searchInput.value = '';
        document.getElementById('categoryFilter').value = '';
        document.getElementById('minPrice').value = '';
        document.getElementById('maxPrice').value = '';
        document.getElementById('endingSoonFilter').checked = false;
        document.getElementById('sortFilter').value = '_score|DESC';

        const url = new URL(`${API_BASE_URL}/latest`);
        fetchDataAndRender(url);
    }

    // --- 4. COUNTDOWN INTERVAL MANAGER ---
    let activeInterval;

    function startCountdowns() {
        if (activeInterval) clearInterval(activeInterval);

        activeInterval = setInterval(() => {
            const timers = document.querySelectorAll('.countdown-timer');
            const now = new Date().getTime();

            timers.forEach(timer => {
                const expiresRaw = timer.getAttribute('data-expires');
                if (!expiresRaw) return;

                const expires = new Date(expiresRaw).getTime();
                if (isNaN(expires)) {
                    timer.innerHTML = "Data Inválida";
                    return;
                }

                const distance = expires - now;

                if (distance < 0) {
                    timer.innerHTML = "ENCERRADO";
                    timer.style.color = "#666666";
                } else {
                    const days = Math.floor(distance / (1000 * 60 * 60 * 24));
                    const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
                    const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
                    const seconds = Math.floor((distance % (1000 * 60)) / 1000);

                    let timeStr = "";
                    if (days > 0) timeStr += days + "d ";
                    timeStr += String(hours).padStart(2, '0') + "h "
                        + String(minutes).padStart(2, '0') + "m "
                        + String(seconds).padStart(2, '0') + "s";

                    timer.innerHTML = timeStr;
                }
            });
        }, 1000);
    }

    // --- COMMON RENDER LOGIC ---
    function fetchDataAndRender(url) {
        const grid = document.getElementById('resultsGrid');
        grid.innerHTML = '<p>Buscando dados no servidor...</p>';

        fetch(url)
            .then(res => {
                if (!res.ok) throw new Error("Erro de comunicação. O servidor está ligado?");
                return res.json();
            })
            .then(data => {
                grid.innerHTML = '';
                const items = Array.isArray(data.content) ? data.content :
                    Array.isArray(data) ? data : [];

                if (items.length === 0) {
                    grid.innerHTML = '<p style="color:#cc0000; font-weight:bold;">Nenhum item corresponde à sua busca.</p>';
                    return;
                }

                items.forEach(item => {
                    const price = item.currentBidPrice ? item.currentBidPrice.toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' }) : 'R$ 0,00';
                    const fallbackImg = 'https://via.placeholder.com/180x140?text=Sem+Foto';
                    const imgUrl = item.mainImageUrl ? item.mainImageUrl : fallbackImg;
                    const dateRaw = item.expirationDate ? item.expirationDate : '';

                    const card = `
                        <div class="card">
                            <img src="${imgUrl}" alt="${item.title}" onerror="this.src='${fallbackImg}'">
                            <span class="card-title">${item.title}</span>
                            <div class="badges">[${item.category}] - ${item.status}</div>
                            <div class="card-desc">${item.description ? item.description.substring(0, 60) + '...' : 'Sem descrição'}</div>
                            <div class="timer-box">
                                Tempo Restante:<br>
                                <span class="countdown-timer" data-expires="${dateRaw}">Calculando...</span>
                            </div>
                            <div class="price">${price}</div>
                            <button style="width: 100%;">Dar Lance »</button>
                        </div>
                    `;
                    grid.innerHTML += card;
                });

                // Start the countdown logic once the cards are injected into the DOM
                startCountdowns();
            })
            .catch(err => {
                grid.innerHTML = `<p style="color:#cc0000;"><b>Erro de Sistema:</b> ${err.message}</p>`;
                console.error(err);
            });
    }

    window.onload = loadLatest;
</script>

</body>
</html>
